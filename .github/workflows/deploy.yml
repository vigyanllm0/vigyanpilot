name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "frontend/**"
      - "**.md"
      - ".github/**"

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/vigyanpilot

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Create virtual env if missing
            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi
            source .venv/bin/activate

            # Clean up disk space and add swap for compilation
            sudo apt-get clean -y 2>/dev/null
            sudo journalctl --rotate --vacuum-size=50M 2>/dev/null
            docker system prune -f 2>/dev/null || true
            if ! swapon --show | grep -q .; then
              sudo fallocate -l 2G /swapfile 2>/dev/null
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile 2>/dev/null
              sudo swapon /swapfile 2>/dev/null
            fi
            df -h / | tail -1

            # Install pysam — prefer pre-built wheel, fall back to system package
            pip install pysam==0.23.3 --only-binary :all: --quiet 2>/dev/null || \
              sudo apt-get install -y python3-pysam 2>/dev/null || \
              echo "pysam fallback: will try from source with swap"
            pip install -r requirements.txt --quiet

            # Write .env file from GitHub Secrets
            cat > .env << ENVEOF
            PRIMERFORCE_SECRET=${{ secrets.PRIMERFORCE_SECRET }}
            PRIMERFORCE_ADMIN_EMAIL=${{ secrets.PRIMERFORCE_ADMIN_EMAIL }}
            PRIMERFORCE_ADMIN_PASSWORD=${{ secrets.PRIMERFORCE_ADMIN_PASSWORD }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            PRIMERFORCE_UPI_ID=${{ secrets.PRIMERFORCE_UPI_ID }}
            ENVEOF

            # Start PostgreSQL
            if command -v pg_isready &>/dev/null && pg_isready -q 2>/dev/null; then
              echo "PostgreSQL is running"
            elif command -v pg_ctlcluster &>/dev/null; then
              sudo pg_ctlcluster $(pg_lsclusters -h | head -1 | awk '{print $1, $2}') start 2>/dev/null || true
            elif command -v docker &>/dev/null; then
              sudo docker start vigyanpilot-postgres-1 2>/dev/null || \
                sudo docker start vigyanpilot_postgres_1 2>/dev/null || \
                echo "PostgreSQL container not found"
            else
              echo "WARNING: No PostgreSQL found — ensure DATABASE_URL points to a running instance"
            fi
            sleep 2

            # Run database migrations
            python deploy/migrations/migrate.py

            # Restart backend
            pkill gunicorn 2>/dev/null || true
            sleep 1
            nohup gunicorn --bind 0.0.0.0:5000 --workers 1 --timeout 120 \
              --access-logfile - --error-logfile - wsgi:app \
              > /tmp/vigyan_backend.log 2>&1 &

            # Verify
            sleep 4
            curl -sf http://localhost:5000/health && echo " OK" || echo " FAIL"
          ENDSSH

      - name: Health check via Vercel proxy
        run: |
          sleep 5
          curl -sf https://vigyanllm.in/api/health && echo " — Vercel proxy OK" || echo " — Vercel proxy FAIL"
