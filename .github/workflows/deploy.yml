name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "frontend/**"
      - "**.md"

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/vigyanpilot

            # Clean up disk space before anything else
            sudo apt-get clean -y 2>/dev/null
            sudo journalctl --rotate --vacuum-size=10M 2>/dev/null
            sudo rm -rf /tmp/* 2>/dev/null || true
            docker system prune -af 2>/dev/null || true
            docker image prune -af 2>/dev/null || true
            df -h / | tail -1

            # Add swap if not present (small file given disk constraints)
            if ! swapon --show | grep -q .; then
              sudo dd if=/dev/zero of=/swapfile bs=1M count=512 2>/dev/null
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile 2>/dev/null
              sudo swapon /swapfile 2>/dev/null || echo "Swap creation failed — continuing"
            fi

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Create virtual env if missing
            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi
            source .venv/bin/activate

            # Install pysam — prefer pre-built wheel, fall back to system package
            pip install pysam==0.23.3 --only-binary :all: --no-cache-dir --quiet 2>/dev/null || \
              (sudo apt-get update -qq && sudo apt-get install -y python3-pysam 2>/dev/null) || \
              echo "WARNING: pysam not installed — primer design will fail for some features"

            # Install remaining Python deps (no cache to save disk)
            pip install -r requirements.txt --no-cache-dir --quiet

            # Write .env file from GitHub Secrets
            : > .env
            printf '%s\n' "PRIMERFORGE_SECRET=${{ secrets.PRIMERFORGE_SECRET }}" >> .env
            printf '%s\n' "PRIMERFORGE_ADMIN_EMAIL=${{ secrets.PRIMERFORGE_ADMIN_EMAIL }}" >> .env
            printf '%s\n' "PRIMERFORGE_ADMIN_PASSWORD=${{ secrets.PRIMERFORGE_ADMIN_PASSWORD }}" >> .env
            printf '%s\n' "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            
            # Clean up DATABASE_URL if the secret contains the key prefix
            # (e.g. "DATABASE_URL=postgresql://..." instead of "postgresql://...")
            sed -i 's/^DATABASE_URL=DATABASE_URL=/DATABASE_URL=/' .env
            printf '%s\n' "FORCE_HTTPS=false" >> .env
            printf '%s\n' "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
            printf '%s\n' "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
            printf '%s\n' "RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" >> .env
            printf '%s\n' "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            printf '%s\n' "PRIMERFORGE_UPI_ID=${{ secrets.PRIMERFORGE_UPI_ID }}" >> .env

            # Start PostgreSQL
            if command -v pg_isready &>/dev/null && pg_isready -q 2>/dev/null; then
              echo "PostgreSQL is running"
            elif command -v pg_ctlcluster &>/dev/null; then
              sudo pg_ctlcluster $(pg_lsclusters -h | head -1 | awk '{print $1, $2}') start 2>/dev/null || true
            elif command -v docker &>/dev/null; then
              sudo docker start vigyanpilot-postgres-1 2>/dev/null || \
                sudo docker start vigyanpilot_postgres_1 2>/dev/null || \
                echo "PostgreSQL container not found"
            else
              echo "WARNING: No PostgreSQL found — ensure DATABASE_URL points to a running instance"
            fi
            sleep 2

            # Ensure log directory exists
            sudo mkdir -p /var/log/vigyan
            sudo chown ubuntu:ubuntu /var/log/vigyan

            # Install systemd service on first deploy
            if [ ! -f /etc/systemd/system/vigyan.service ]; then
              sudo cp deploy/vigyan.service /etc/systemd/system/vigyan.service
              sudo systemctl daemon-reload
              sudo systemctl enable vigyan
              echo "Installed systemd service"
            fi

            # Run database migrations
            python deploy/migrations/migrate.py

            # Restart backend via systemd
            sudo systemctl restart vigyan

            # Verify
            sleep 4
            curl -sf http://localhost:5000/health && echo " OK" || echo " FAIL"
          ENDSSH

      - name: Health check via Vercel proxy
        run: |
          sleep 5
          curl -sf https://vigyanllm.in/health || { echo " — Vercel proxy FAIL"; exit 1; }
          curl -sf https://vigyanllm.in/api/config/public || { echo " — API config FAIL"; exit 1; }
          echo " — All endpoints OK"
