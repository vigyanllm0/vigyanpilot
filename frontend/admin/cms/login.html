<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting — VigyanLLM CMS</title>
<style>
body{background:#0F172A;color:#fff;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
p{color:#94A3B8;font-size:14px;}
</style>
</head>
<body>
<div style="text-align:center">
  <p>Redirecting to CMS...</p>
</div>
<script>
(async function() {
  const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:8001' : 'https://api.vigyanllm.in';
  const pfToken = sessionStorage.getItem('pf_token');
  if (!pfToken) {
    window.location.href = '/primer?showLogin=1&redirect=' + encodeURIComponent('/admin/cms/dashboard.html');
    return;
  }
  try {
    const r = await fetch(API_BASE + '/api/v1/cms/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: pfToken}),
    });
    if (!r.ok) throw new Error('Auth failed');
    const data = await r.json();
    localStorage.setItem('vp_cms_token', data.token);
    localStorage.setItem('vp_cms_user', JSON.stringify(data.user || {email:'',display_name:'User',role:'editor'}));
    window.location.href = '/admin/cms/dashboard.html';
  } catch(e) {
    window.location.href = '/primer?showLogin=1';
  }
})();
</script>
</body>
</html>
