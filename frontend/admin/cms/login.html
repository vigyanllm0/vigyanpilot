<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VigyanLLM CMS</title>
<link rel="stylesheet" href="/admin/cms/css/admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  .login-card .logo { font-size: 24px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif; margin-bottom: 16px; letter-spacing: -0.02em; color: #22D3EE; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="logo">VigyanLLM</div>
    <h1>CMS Login</h1>
    <p>Sign in to manage your content</p>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@vigyanllm.in" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button class="btn-primary" id="loginBtn" style="width:100%;padding:12px;font-size:15px;">Sign In</button>
  </div>
</div>
<script>
document.getElementById('loginBtn').addEventListener('click', async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  if (!email || !password) {
    errorEl.textContent = 'Please enter email and password';
    errorEl.style.display = 'block';
    return;
  }
  try {
    const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:8001' : '';
    const res = await fetch(API_BASE + '/api/v1/cms/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.detail || 'Login failed');
    const token = data.token;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const user = { id: payload.sub, email: payload.email, role: payload.role };
    localStorage.setItem('vp_cms_token', token);
    localStorage.setItem('vp_cms_user', JSON.stringify(user));
    window.location.href = '/admin/cms/dashboard.html';
  } catch (e) {
    errorEl.textContent = e.message || 'Invalid credentials';
    errorEl.style.display = 'block';
  }
});
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
