<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Opening database...</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0f172a}
    .box{border:1px solid #e2e8f0;border-radius:8px;background:#fff;padding:22px 24px;box-shadow:0 10px 30px rgba(15,23,42,.08);max-width:420px}
    h1{font-size:17px;margin:0 0 8px}
    p{font-size:13px;line-height:1.5;color:#475569;margin:0}
    a{color:#2563eb}
  </style>
</head>
<body>
  <div class="box">
    <h1>Opening database...</h1>
    <p>If the browser does not continue automatically, <a id="fallback" href="#">open the database</a>.</p>
  </div>
  <script>
    const allowed = new Set([
      'https://genome.ucsc.edu/'
    ]);
    const target = new URLSearchParams(location.search).get('to') || '';
    const fallback = document.getElementById('fallback');
    if (allowed.has(target)) {
      fallback.href = target;
      setTimeout(() => { window.location.replace(target); }, 50);
    } else {
      document.querySelector('h1').textContent = 'Database link blocked';
      document.querySelector('p').textContent = 'This redirect target is not allowed.';
    }
  </script>
</body>
</html>
