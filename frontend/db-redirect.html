</head>
<body>
  <div class="box">
    <h1>Opening database...</h1>
    <p>If the browser does not continue automatically, <a id="fallback" href="#">open the database</a>.</p>
  </div>
  <script>
    const allowed = new Set([
      'https://genome.ucsc.edu/'
    ]);
    const target = new URLSearchParams(location.search).get('to') || '';
    const fallback = document.getElementById('fallback');
    if (allowed.has(target)) {
      fallback.href = target;
      setTimeout(() => { window.location.replace(target); }, 50);
    } else {
      document.querySelector('h1').textContent = 'Database link blocked';
      document.querySelector('p').textContent = 'This redirect target is not allowed.';
    }
  </script>
</body>
