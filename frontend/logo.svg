<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Hexagonal outer border -->
  <polygon points="60,6 104,31 104,89 60,114 16,89 16,31" fill="none" stroke="#1a3a5c" stroke-width="2.5"/>
  <!-- Inner hex frame decoration -->
  <polygon points="60,14 98,35 98,85 60,106 22,85 22,35" fill="none" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>

  <!-- DNA double helix left strand -->
  <path d="M44,18 Q36,30 44,42 Q52,54 44,66 Q36,78 44,90 Q52,102 44,110" fill="none" stroke="#2a5080" stroke-width="3" stroke-linecap="round"/>
  <!-- DNA double helix right strand -->
  <path d="M76,18 Q84,30 76,42 Q68,54 76,66 Q84,78 76,90 Q68,102 76,110" fill="none" stroke="#2a5080" stroke-width="3" stroke-linecap="round"/>

  <!-- DNA rungs -->
  <line x1="44" y1="24" x2="76" y2="24" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="33" x2="78" y2="33" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="42" x2="76" y2="42" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="47" y1="51" x2="73" y2="51" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="60" x2="76" y2="60" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="69" x2="78" y2="69" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="78" x2="76" y2="78" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="47" y1="87" x2="73" y2="87" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="96" x2="76" y2="96" stroke="#2a5080" stroke-width="1.5" opacity="0.7"/>

  <!-- Neural network nodes (right side) -->
  <circle cx="88" cy="38" r="3" fill="#2a5080"/>
  <circle cx="96" cy="52" r="3" fill="#2a5080"/>
  <circle cx="92" cy="66" r="3" fill="#2a5080"/>
  <circle cx="88" cy="80" r="3" fill="#2a5080"/>
  <circle cx="80" cy="46" r="2.5" fill="#2a5080" opacity="0.8"/>
  <circle cx="84" cy="60" r="2.5" fill="#2a5080" opacity="0.8"/>
  <circle cx="80" cy="74" r="2.5" fill="#2a5080" opacity="0.8"/>

  <!-- Neural connections -->
  <line x1="88" y1="38" x2="96" y2="52" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="96" y1="52" x2="92" y2="66" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="92" y1="66" x2="88" y2="80" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="88" y1="38" x2="80" y2="46" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="96" y1="52" x2="80" y2="46" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="96" y1="52" x2="84" y2="60" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="92" y1="66" x2="84" y2="60" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="92" y1="66" x2="80" y2="74" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="88" y1="80" x2="80" y2="74" stroke="#2a5080" stroke-width="1" opacity="0.6"/>

  <!-- Molecular nodes (left side) -->
  <circle cx="32" cy="38" r="3" fill="#2a5080"/>
  <circle cx="24" cy="52" r="3" fill="#2a5080"/>
  <circle cx="28" cy="66" r="3" fill="#2a5080"/>
  <circle cx="32" cy="80" r="3" fill="#2a5080"/>
  <!-- Connection lines left -->
  <line x1="32" y1="38" x2="24" y2="52" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="24" y1="52" x2="28" y2="66" stroke="#2a5080" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="66" x2="32" y2="80" stroke="#2a5080" stroke-width="1" opacity="0.6"/>

  <!-- Central glowing node -->
  <circle cx="60" cy="60" r="6" fill="#1a3a5c"/>
  <circle cx="60" cy="60" r="4" fill="#2a6090"/>
  <circle cx="60" cy="60" r="2" fill="#5090c0"/>
</svg>
