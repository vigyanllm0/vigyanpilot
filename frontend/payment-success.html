<style>
:root :root {
  --navy: #0F172A;
  --navy-light: #1E293B;

  --slate: #F8FAFC;
  --slate-border: #E2E8F0;

  --font-b: 'Inter', sans-serif;
  --max-w: 1100px;
  --sec-p: 100px;

* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Inter,sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { max-width:480px; width:90%; text-align:center; padding:48px 36px; border:1px solid var(--border); border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
.icon { width:72px; height:72px; border-radius:50%; background:#ecfdf5; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:36px; }
h1 { font-family:Inter,sans-serif; font-size:28px; font-weight:700; margin-bottom:8px; color:var(--text); }
.sub { font-size:15px; color:var(--text2); margin-bottom:24px; line-height:1.6; }
.details { background:#f8f9fb; border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:24px; text-align:left; }
.detail-row { display:flex; justify-content:space-between; padding:6px 0; font-size:13px; }
.detail-row .label { color:var(--text2); }
.detail-row .value { font-weight:600; color:var(--text); font-family:Inter,sans-serif; font-size:12px; }
.btn { display:inline-block; background:var(--bio); color:#fff; border:none; border-radius:8px; padding:14px 32px; font-size:15px; font-weight:600; cursor:pointer; text-decoration:none; transition:background 0.15s; }
.btn:hover { background:#047857; }
.note { margin-top:16px; font-size:11px; color:#9ca3af; }

<div class="card">
  <div class="icon">✅</div>
  <h1>Payment Successful!</h1>
  <p class="sub">Your primer design credits have been unlocked. You can now run the pipeline.</p>
  <div class="details" id="payment-details">
    <div class="detail-row"><span class="label">Order ID:</span><span class="value" id="d-order">—</span></div>
    <div class="detail-row"><span class="label">Payment ID:</span><span class="value" id="d-payment">—</span></div>
    <div class="detail-row"><span class="label">Amount:</span><span class="value" id="d-amount">₹49</span></div>
    <div class="detail-row"><span class="label">Runs Unlocked:</span><span class="value" id="d-runs">1</span></div>
    <div class="detail-row"><span class="label">Status:</span><span class="value" style="color:#059669">VERIFIED</span></div>
  </div>

  <p class="note">Your transaction receipt has been saved to your account. Contact us at contact@vigyanllm.in for support.</p>
</div>
<script>
  // Read payment details from URL params or sessionStorage
  const params = new URLSearchParams(window.location.search);
  const stored = JSON.parse(sessionStorage.getItem('pf_last_payment') || '{}');
  document.getElementById('d-order').textContent = params.get('order_id') || stored.order_id || '—';
  document.getElementById('d-payment').textContent = params.get('payment_id') || stored.payment_id || '—';
  document.getElementById('d-amount').textContent = '₹' + (params.get('amount') || stored.amount || '49');
  document.getElementById('d-runs').textContent = params.get('runs') || stored.runs || '1';
</script>
