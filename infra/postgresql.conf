# =============================================================
# PostgreSQL 16 — Hardened Production Configuration
# Target: E2E Networks C3 Node, 4GB RAM allocation to PG
# =============================================================

# --- Connection & Authentication ---
listen_addresses = '*'              # Accept from Docker network only (no host port exposed)
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# --- Authentication Hardening ---
password_encryption = scram-sha-256  # Reject MD5; enforce SCRAM
authentication_timeout = 30s         # Drop idle auth attempts fast

# --- Memory ---
shared_buffers = 1GB                 # 25% of 4GB container limit
effective_cache_size = 3GB           # 75% of available
work_mem = 16MB                      # Per-sort/hash; conservative for concurrency
maintenance_work_mem = 256MB         # VACUUM, CREATE INDEX
huge_pages = try

# --- WAL & Durability ---
wal_level = replica                  # Enables PITR and streaming replication later
fsync = on                           # NEVER disable in production
synchronous_commit = on
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/data/wal_archive/%f'

# --- Query Planner ---
random_page_cost = 1.1              # SSD storage on E2E
effective_io_concurrency = 200      # SSD-appropriate

# --- Logging & Auditing ---
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 200    # Log queries taking > 200ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'ddl'              # Log all DDL (CREATE, ALTER, DROP)
log_line_prefix = '%m [%p] %u@%d '

# --- Security ---
ssl = off                           # Not needed inside private Docker network
row_security = on                   # Enable Row-Level Security globally

# --- Extensions ---
shared_preload_libraries = 'pg_stat_statements,pgcrypto'
pg_stat_statements.max = 5000
pg_stat_statements.track = all

# --- Autovacuum (tuned for write-heavy) ---
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
