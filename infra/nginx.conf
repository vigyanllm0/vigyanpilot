# ═══════════════════════════════════════════════════════════════════════
# VigyanLLM Nginx Reverse Proxy — Production Configuration
# ═══════════════════════════════════════════════════════════════════════
# Provides:
# - TLS termination (Let's Encrypt via certbot)
# - Slowloris / connection flood protection
# - Request rate limiting at proxy level
# - Large request body rejection
# - Security headers reinforcement
# - WebSocket support (if needed)
# ═══════════════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

upstream primerforge_app {
    server vigyanpilot_app:11436;
    keepalive 32;
}

server {
    listen 80;
    server_name vigyanllm.in www.vigyanllm.in;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name vigyanllm.in www.vigyanllm.in;

    # ── TLS Configuration ─────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/vigyanllm.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vigyanllm.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Slowloris & Connection Flood Protection ───────────────────────
    client_body_timeout 10s;       # Close if body not received in 10s
    client_header_timeout 10s;     # Close if headers not received in 10s
    keepalive_timeout 15s;         # Short keepalive
    send_timeout 10s;              # Close if client stops reading
    limit_conn connlimit 20;       # Max 20 concurrent connections per IP

    # ── Request Size Limits ───────────────────────────────────────────
    client_max_body_size 10M;      # Match app's MAX_CONTENT_LENGTH

    # ── Security Headers (defense-in-depth, app also sets these) ──────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Hide server tokens ────────────────────────────────────────────
    server_tokens off;

    # ── Auth Endpoints (strict rate limit) ────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/register {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/forgot-password {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    # ── Webhook Endpoint (moderate rate) ──────────────────────────────
    location /api/payments/webhook {
        limit_req zone=webhook burst=5 nodelay;
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    # ── All API Endpoints ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    # ── Health Check (no rate limit) ──────────────────────────────────
    location /health {
        proxy_pass http://primerforge_app;
        include /etc/nginx/proxy_params;
    }

    # ── Static Files (frontend) ───────────────────────────────────────
    location / {
        root /var/www/vigyanpilot/static;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Block common attack paths ─────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|git|sql|bak|old|conf)$ {
        deny all;
        return 404;
    }

    location ~ ^/(phpmyadmin|wp-admin|admin|console|debug) {
        deny all;
        return 404;
    }
}
