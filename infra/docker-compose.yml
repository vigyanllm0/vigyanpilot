version: "3.9"

services:
  # ── PostgreSQL Database (private, no port exposed) ──────────────────
  postgres:
    image: postgres:16.4
    container_name: vigyanpilot_postgres
    restart: always
    env_file:
      - .env.postgres
    user: "999:999"
    volumes:
      - /opt/postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - app_network
    shm_size: "256m"
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigyanpilot_app -d vigyanpilot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (rate limiting + token blacklist) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vigyanpilot_redis
    restart: always
    networks:
      - app_network
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── VigyanLLM Flask API ───────────────────────────────────────────
  app:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: vigyanpilot_app
    restart: always
    env_file:
      - .env.app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FORCE_HTTPS=true
      - MAX_SESSIONS=5
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11436/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (async pipeline execution) ────────────────────────
  worker:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: vigyanpilot_worker
    restart: always
    env_file:
      - .env.app
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A primerforge.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - /opt/blast_db:/opt/blast_db:ro
      - /opt/bowtie2_idx:/opt/bowtie2_idx:ro
      - /opt/pathogen_db:/opt/pathogen_db:ro
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # ── Nginx Reverse Proxy (TLS termination + Slowloris protection) ────
  nginx:
    image: nginx:1.27-alpine
    container_name: vigyanpilot_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy_params:/etc/nginx/proxy_params:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ../index.html:/var/www/vigyanpilot/static/index.html:ro
      - ../primer.html:/var/www/vigyanpilot/static/primer.html:ro
      - ../payment-success.html:/var/www/vigyanpilot/static/payment-success.html:ro
      - ../payment-failed.html:/var/www/vigyanpilot/static/payment-failed.html:ro
    networks:
      - app_network
    depends_on:
      app:
        condition: service_healthy

networks:
  app_network:
    driver: bridge
