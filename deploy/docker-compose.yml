version: "3.9"

# ── VigyanPilot Production Docker Compose ─────────────────────────────────
# Secrets are passed via environment variables — never hardcoded here.
# All services run with resource limits, non-root users where possible,
# and capability dropping for defense-in-depth.
#
# Required .env vars (set on host before running):
#   PGPASSWORD, PRIMERFORGE_SECRET, PRIMERFORGE_ADMIN_EMAIL,
#   PRIMERFORGE_ADMIN_PASSWORD, RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET,
#   RAZORPAY_WEBHOOK_SECRET, GOOGLE_CLIENT_ID, REDIS_PASSWORD
#
# Start: docker-compose --env-file /path/to/.env up -d
# Stop:  docker-compose down

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Run as non-root user (postgres uid 70 in alpine image)
    user: "70:70"
    environment:
      POSTGRES_USER: vigyan
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: vigyanpilot
      # Enforce SSL connections inside the bridge network
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    # Resource limits — prevent OOM on small instances
    mem_limit: 512m
    cpus: "1.0"
    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigyan -d vigyanpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # CAP-03 (CRITICAL): Redis now requires AUTH password — no unauthenticated access
    # Password is injected via REDIS_PASSWORD env var (never hardcoded)
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - backend
    mem_limit: 192m
    cpus: "0.5"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Authenticate when checking health
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:11436:11436"
    environment:
      FORCE_HTTPS: "true"
      VIGYANLLM_ENV: "production"
      PRIMERFORGE_SECRET: ${PRIMERFORGE_SECRET}
      PRIMERFORGE_ADMIN_EMAIL: ${PRIMERFORGE_ADMIN_EMAIL}
      PRIMERFORGE_ADMIN_PASSWORD: ${PRIMERFORGE_ADMIN_PASSWORD}
      DATABASE_URL: postgresql://vigyan:${PGPASSWORD}@postgres:5432/vigyanpilot
      # CAP-03: Redis URL now includes AUTH password
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      # CAP-07: Dedicated webhook secret (not same as key secret)
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ORIGINS: https://vigyanllm.in,https://www.vigyanllm.in,https://app.vigyanllm.in
      PRIMERFORGE_PORT: "11436"
      PRIMERFORGE_HOST: "0.0.0.0"
      MAX_SESSIONS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    # Resource limits — prevent single process from OOMing the host
    mem_limit: 1g
    cpus: "2.0"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem — writable paths via tmpfs
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /var/run:size=16m,mode=0755

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - backend
    mem_limit: 256m
    cpus: "0.5"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

networks:
  backend:
    driver: bridge
    # Restrict internal network to known subnets only
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  pgdata:
  nginx_cache:
